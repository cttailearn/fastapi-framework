<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台登录</title>
    <style>
      :root { --border: #e5e7eb; --text: #0f172a; --muted: #64748b; --brand: #2563eb; --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 18px 50px rgba(15, 23, 42, 0.12); }
      * { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; margin: 0; background: #f6f7fb; color: var(--text); }
      .wrap { max-width: 980px; margin: 0 auto; padding: 40px 16px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 18px; align-items: start; }
      .card { background: #fff; border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 18px; }
      h1 { font-size: 18px; margin: 0 0 10px; }
      p { margin: 0; color: var(--muted); line-height: 1.6; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; }
      input { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 12px 12px; color: var(--text); outline: none; }
      input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
      button { width: 100%; margin-top: 14px; background: var(--brand); border: 0; border-radius: 12px; padding: 12px; color: #fff; cursor: pointer; font-weight: 800; }
      .error { background: #fff1f2; border: 1px solid #fecdd3; color: #881337; padding: 10px 12px; border-radius: 12px; margin-top: 12px; }
      .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 999px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 12px; }
      .icon { width: 28px; height: 28px; border-radius: 10px; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 900; }
      @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="badge"><span class="icon">A</span>任务服务后台</div>
        <h1 style="margin-top: 12px;">管理员登录</h1>
        <p>使用管理员账号登录后，可管理 API-Key、任务与请求日志。</p>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login" style="margin-top: 12px;">
          <label>用户名</label>
          <input name="username" autocomplete="username" required />
          <label>密码</label>
          <input name="password" type="password" autocomplete="current-password" required />
          <button type="submit">登录</button>
        </form>
      </div>
      <div class="card">
        <h1>提示</h1>
        <p>首次通过 API 注册的用户会自动成为管理员。</p>
        <p style="margin-top: 10px;">建议上线时通过环境变量配置：</p>
        <p style="margin-top: 6px;"><span style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;">APP_SECRET_KEY</span></p>
        <p><span style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;">APP_DB_PATH</span></p>
      </div>
    </div>
  </body>
</html>

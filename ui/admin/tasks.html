{% extends "admin/base.html" %}
{% block content %}
  <div class="topbar">
    <h1>任务</h1>
    <div class="row">
      <a class="pill" href="/admin">返回概览</a>
    </div>
  </div>

  <div class="card">
    <div class="muted" style="margin-bottom: 10px;">最近 200 条任务</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>任务ID</th>
            <th>类型</th>
            <th>状态</th>
            <th>进度</th>
            <th>创建时间</th>
            <th>更新时间</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for t in tasks %}
            <tr>
              <td class="mono">{{ t.task_id }}</td>
              <td>{{ t.type }}</td>
              <td><span class="tag">{{ t.status.value if t.status else t.status }}</span></td>
              <td class="muted">{{ t.progress }}%</td>
              <td class="muted">{{ t.created_at }}</td>
              <td class="muted">{{ t.updated_at }}</td>
              <td>
                <div class="row" style="gap: 8px;">
                  <form method="post" action="/admin/tasks/{{ t.task_id }}/cancel">
                    <button class="ghost" type="submit">取消</button>
                  </form>
                  <form method="post" action="/admin/tasks/{{ t.task_id }}/delete">
                    <button class="danger" type="submit">删除</button>
                  </form>
                </div>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
